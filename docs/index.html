        header .subtitle { opacity: 0.9; font-size: 14px; }

        /* KPI */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .kpi-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .kpi-card .label { font-size: 13px; color: #666; margin-bottom: 8px; }
        .kpi-card .value { font-size: 32px; font-weight: 700; color: #333; }
        .kpi-card .value.danger { color: #e74c3c; }
        .kpi-card .value.success { color: #27ae60; }
        .kpi-card .value.warning { color: #f39c12; }

        /* AI 建议区 */

            padding: 24px;
            margin-bottom: 24px;
            color: white;
        }

        .suggestion-list { display: grid; gap: 12px; }
        .suggestion-item {
            background: rgba(255,255,255,0.95);
            color: #333;
            padding: 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .suggestion-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .suggestion-item .icon { font-size: 24px; }
        .suggestion-item .content { flex: 1; }
        .suggestion-item .title { font-weight: 600; margin-bottom: 4px; }
        .suggestion-item .desc { font-size: 13px; color: #666; }
        .suggestion-item .meta { font-size: 12px; color: #999; margin-top: 6px; }
        .suggestion-item .links { display: flex; gap: 8px; margin-top: 8px; }
        .suggestion-item .link {
            font-size: 12px;
            color: #667eea;
            text-decoration: none;
            padding: 2px 8px;
            background: #f0f2ff;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .suggestion-item .link:hover { background: #e0e4ff; }

        /* 图表 */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .chart-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .chart-card h3 { font-size: 16px; margin-bottom: 16px; color: #444; }
        .chart-container { position: relative; height: 250px; }

        /* 预警 */
        .alert-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 24px;
        }
        .alert-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .alert-item.danger { background: #fff5f5; border-left: 4px solid #e74c3c; }
        .alert-item.warning { background: #fffbeb; border-left: 4px solid #f39c12; }
        .alert-item.info { background: #eff6ff; border-left: 4px solid #3b82f6; }

        /* 表格 */
        .table-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; color: #555; font-size: 12px; }
        tr:hover { background: #f8f9fa; cursor: pointer; }
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin: 2px;
        }
        .tag-danger { background: #fee2e2; color: #dc2626; }
        .tag-warning { background: #fef3c7; color: #d97706; }
        .tag-success { background: #d1fae5; color: #059669; }

        /* 对话详情弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);

        }
        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;

        .modal-close {

            border: none;
            color: white;
            width: 32px; height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;

            overflow-y: auto;

        .detail-item {
            background: #f8f9fa;

            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: transform 0.2s;
        }
        .generate-btn:hover { transform: scale(1.05); }
        .generate-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        function generateRuleBasedSuggestions() {
            const suggestions = [];

            if (churnConvs.length > 0) {

                });
            }

            // 2. 情绪爆发
            const outburstConvs = conversations.filter(c => c.tags.includes('情绪爆发'));
            if (outburstConvs.length > 0) {
                suggestions.push({
                    icon: '🟠',
                    title: `情绪爆发处理：${outburstConvs.length} 条对话情绪失控`,
                    desc: '用户情绪激烈，建议主管跟进安抚，必要时升级处理',
                    priority: 'high',
                    action: '主管跟进',
                    links: outburstConvs.map(c => ({ id: c.conversation_id, text: c.conversation_id }))
                });
            }

            // 3. 转人工分析
            const transferConvs = conversations.filter(c => c.agent_performance.was_transferred);
            if (transferConvs.length > 0) {
                suggestions.push({
                    icon: '🔵',
                    title: `转人工分析：${transferConvs.length} 条对话用户要求转人工`,
                    desc: '建议优化智能客服话术，提前识别用户意图减少转接',
                    priority: 'medium',
                    action: '优化流程',
                    links: transferConvs.map(c => ({ id: c.conversation_id, text: c.conversation_id }))
                });
            }

            // 4. 客服评分低
            const agentScores = {};
            const agentCounts = {};
            conversations.forEach(c => {
                agentScores[c.agent_name] = (agentScores[c.agent_name] || 0) + c.agent_performance.response_quality;
                agentCounts[c.agent_name] = (agentCounts[c.agent_name] || 0) + 1;
            });
            const avgScores = Object.keys(agentScores).map(a => ({
                name: a,
                avg: agentScores[a] / agentCounts[a]
            }));
            const lowestAgent = avgScores.sort((a, b) => a.avg - b.avg)[0];
            if (lowestAgent && lowestAgent.avg < 3.5) {
                suggestions.push({
                    icon: '🟡',
                    title: `客服培训建议：${lowestAgent.name} 平均评分 ${lowestAgent.avg.toFixed(1)} 偏低`,
                    desc: `低于团队平均水平，建议安排服务技巧培训或案例复盘`,
                    priority: 'medium',
                    action: '培训提升',
                    links: conversations.filter(c => c.agent_name === lowestAgent.name).map(c => ({ id: c.conversation_id, text: c.conversation_id }))
                });
            }

            // 5. 诉求分类聚类
            const catCounts = {};
            conversations.forEach(c => c.issues.forEach(i => {
                catCounts[i.issue_category] = (catCounts[i.issue_category] || 0) + 1;
            }));
            const topCat = Object.entries(catCounts).sort((a, b) => b[1] - a[1])[0];
            if (topCat && topCat[1] >= 5) {
                suggestions.push({
                    icon: '🟢',
                    title: `产品优化建议：${topCat[0]} 类诉求占比 ${Math.round(topCat[1]/conversations.reduce((s,c)=>s+c.issues.length,0)*100)}%`,
                    desc: `本周 ${topCat[0]} 类问题最多，建议排查相关产品或流程问题`,
                    priority: 'low',
                    action: '产品排查',
                    links: conversations.filter(c => c.issues.some(i => i.issue_category === topCat[0])).map(c => ({ id: c.conversation_id, text: c.conversation_id }))
                });
            }

            // 6. 重复投诉
            const repeatConvs = conversations.filter(c => c.tags.includes('重复投诉'));
            if (repeatConvs.length > 0) {
                suggestions.push({
                    icon: '🟣',
                    title: `重复投诉关注：${repeatConvs.length} 条对话涉及重复投诉`,
                    desc: '用户多次反馈同类问题，说明根源未解决，需专项跟进',
                    priority: 'high',
                    action: '专项跟进',
                    links: repeatConvs.map(c => ({ id: c.conversation_id, text: c.conversation_id }))
                });
            }

            return suggestions;

            // 可以扩展为显示建议的详细分析
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // ====== 渲染其他部分 ======
        function calculateKPIs() {
            const total = conversations.length;
            let resolved = 0, pending = 0;
            conversations.forEach(c => {
                c.issues.forEach(i => {
                    if (i.is_resolved === true) resolved++;
                    else if (i.is_resolved === 'pending') pending++;
                });
            });
            const totalIssues = conversations.reduce((sum, c) => sum + c.issues.length, 0);
            const churn = conversations.filter(c => c.churn_risk.has_risk).length;
            const transfer = conversations.filter(c => c.agent_performance.was_transferred).length;
            const avgQuality = conversations.reduce((s, c) => s + c.agent_performance.response_quality, 0) / total;

            document.getElementById('total-count').textContent = total;
            document.getElementById('resolve-rate').textContent = Math.round(resolved/totalIssues*100) + '%';
            document.getElementById('churn-count').textContent = churn;
            document.getElementById('transfer-count').textContent = transfer;
            document.getElementById('avg-quality').textContent = avgQuality.toFixed(1);
        }

        function renderCharts() {
            const catCounts = {};
            conversations.forEach(c => c.issues.forEach(i => {
                catCounts[i.issue_category] = (catCounts[i.issue_category] || 0) + 1;
            }));
            new Chart(document.getElementById('categoryChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(catCounts),
                    datasets: [{
                        data: Object.values(catCounts),
                        backgroundColor: ['#667eea','#764ba2','#f093fb','#f5576c','#4facfe','#43e97b','#fa709a','#fee140','#30cfd0','#a8edea']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
            });

            const sentCounts = { angry:0, frustrated:0, neutral:0, satisfied:0, happy:0 };
            conversations.forEach(c => { sentCounts[c.sentiment.final]++; });
            new Chart(document.getElementById('sentimentChart'), {
                type: 'bar',
                data: {
                    labels: ['愤怒','沮丧','中性','满意','开心'],
                    datasets: [{
                        label: '最终情绪',
                        data: [sentCounts.angry, sentCounts.frustrated, sentCounts.neutral, sentCounts.satisfied, sentCounts.happy],
                        backgroundColor: ['#e74c3c','#f39c12','#95a5a6','#3498db','#27ae60']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
            });

            const tagCounts = {};
            conversations.forEach(c => c.tags.forEach(t => {
                tagCounts[t] = (tagCounts[t] || 0) + 1;
            }));
            new Chart(document.getElementById('tagChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(tagCounts),
                    datasets: [{ data: Object.values(tagCounts), backgroundColor: '#667eea' }]
                },
                options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } } }
            });

            const agentScores = {}; const agentCounts = {};
            conversations.forEach(c => {
                agentScores[c.agent_name] = (agentScores[c.agent_name] || 0) + c.agent_performance.response_quality;
                agentCounts[c.agent_name] = (agentCounts[c.agent_name] || 0) + 1;
            });
            new Chart(document.getElementById('agentChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(agentScores),
                    datasets: [{
                        label: '平均评分',
                        data: Object.keys(agentScores).map(a => (agentScores[a]/agentCounts[a]).toFixed(1)),
                        backgroundColor: ['#667eea','#764ba2','#f093fb']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 5 } } }
            });
        }

        function renderAlerts() {
            const alerts = [];
            conversations.forEach(c => {
                if (c.churn_risk.has_risk) alerts.push({ type: 'danger', text: `<strong>${c.conversation_id}</strong> · 流失风险 · ${c.churn_risk.risk_reason}` });
                if (c.tags.includes('情绪爆发')) alerts.push({ type: 'warning', text: `<strong>${c.conversation_id}</strong> · 情绪爆发` });
                if (c.tags.includes('转人工')) alerts.push({ type: 'info', text: `<strong>${c.conversation_id}</strong> · 转人工` });
            });
            document.getElementById('alert-list').innerHTML = alerts.map(a => 
                `<div class="alert-item ${a.type}">${a.text}</div>`
            ).join('') || '<p style="color:#666;">暂无异常告警</p>';
        }

        function renderTable() {
            const html = conversations.map(c => {
                const tagHtml = c.tags.map(t => {
                    const cls = t === '流失风险' || t === '情绪爆发' ? 'tag-danger' : t === '转人工' ? 'tag-warning' : 'tag-success';
                    return `<span class="tag ${cls}">${t}</span>`;
                }).join('');
                const riskHtml = c.churn_risk.has_risk ? `<span class="tag tag-danger">${c.churn_risk.risk_level}</span>` : '<span class="tag tag-success">无</span>';
                return `<tr onclick="showConversationDetail('${c.conversation_id}')">
                    <td>${c.conversation_id}</td>
                    <td>${c.channel}</td>
                    <td>${c.agent_name}</td>
                    <td>${c.issues.map(i => i.issue_summary).join('<br>')}</td>
                    <td>${c.issues.map(i => i.issue_category).join('<br>')}</td>
                    <td>${c.issues.map(i => i.is_resolved === true ? '✅' : i.is_resolved === 'pending' ? '⏳' : '❌').join('<br>')}</td>
                    <td>${c.sentiment.initial} → ${c.sentiment.final}</td>
                    <td>${tagHtml}</td>
                    <td>${riskHtml}</td>
                </tr>`;
            }).join('');
            document.getElementById('conversation-table').innerHTML = html;
        }

        // 初始化
        function init() {
            calculateKPIs();
            renderCharts();
            renderAlerts();
            renderTable();

            // 尝试加载缓存的建议
            const cached = localStorage.getItem('cs_suggestions');
            if (cached) {
                renderSuggestions(JSON.parse(cached));
            }
        }

        init();
    </script>
</body>
</html>
